<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#050505"/>
  <rect x="28" y="28" width="456" height="456" rx="68"
        fill="none" stroke="#05D9E8" stroke-width="5" opacity="0.22"/>

  <!--
    Logo icon area is centred at (20,20) in a 36×36 space.
    Scale to fill 512×512 with ~60px padding each side (usable 392px):
      scale = 392 / 22.4 ≈ 17.5
    Transform: translate to canvas centre, scale, then shift logo centre to origin
      translate(256,256) scale(17.5) translate(-20,-20)
  -->
  <g transform="translate(256,256) scale(17.5) translate(-20,-20)">

    <!-- Sword 1 — CYAN (NW → SE) -->
    <line x1="8.8"  y1="8.8"  x2="31.2" y2="31.2"
          stroke="#05D9E8" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Guard 1 -->
    <line x1="14.2" y1="19.1" x2="19.1" y2="14.2"
          stroke="#05D9E8" stroke-width="2.0" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Handle grip 1 -->
    <line x1="25.6" y1="25.6" x2="31.2" y2="31.2"
          stroke="#05D9E8" stroke-width="1.3" stroke-linecap="round" opacity="0.45"/>

    <!-- Sword 2 — PINK (NE → SW) -->
    <line x1="31.2" y1="8.8"  x2="8.8"  y2="31.2"
          stroke="#FF2A6D" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Guard 2 -->
    <line x1="20.9" y1="14.2" x2="25.8" y2="19.1"
          stroke="#FF2A6D" stroke-width="2.0" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Handle grip 2 -->
    <line x1="14.4" y1="25.6" x2="8.8"  y2="31.2"
          stroke="#FF2A6D" stroke-width="1.3" stroke-linecap="round" opacity="0.45"/>


    <!-- Left hemisphere -->
    <path d="M20 15.2 C18.0 15.2 15.7 15.8 14.8 17.1 C13.7 18.7 13.6 20.2 14.0 21.3
             C13.3 21.9 13.1 22.9 13.5 23.9 C14.1 25.2 15.5 25.6 16.6 25.3
             C16.9 26.0 17.8 26.5 18.8 26.5 L20 26.5 Z"
          fill="#FFC200" stroke="#FFC200" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Right hemisphere -->
    <path d="M20 15.2 C22.0 15.2 24.3 15.8 25.2 17.1 C26.3 18.7 26.4 20.2 26.0 21.3
             C26.7 21.9 26.9 22.9 26.5 23.9 C25.9 25.2 24.5 25.6 23.4 25.3
             C23.1 26.0 22.2 26.5 21.2 26.5 L20 26.5 Z"
          fill="#FFC200" stroke="#FFC200" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Centre divider -->
    <line x1="20" y1="15.5" x2="20" y2="26.3"
          stroke="#FFC200" stroke-width="0.65" stroke-dasharray="2,2" opacity="0.5"/>

    <!-- Neural spark -->
    <circle cx="20" cy="14.5" r="1.3" fill="#FFC200" filter="url(#glow-lg)" opacity="0.95"/>

  </g>
</svg>
